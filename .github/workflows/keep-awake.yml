name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app to prevent Streamlit Community Cloud sleep
        run: curl -sf --max-time 30 https://automatic-baappon-gemini-nynm4jzbuqzvgooschesew.streamlit.app/ || true
